version: 2
# Each ecosystem declares two groups:
#   - *-version-updates   (applies-to: version-updates)
#   - *-security-updates  (applies-to: security-updates)
#
# Without the explicit security-updates group, Dependabot opens one
# PR per advisory even when the `groups` block is set for version
# updates.
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      pip-version-updates:
        applies-to: version-updates
        patterns: ["*"]
      pip-security-updates:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      npm-version-updates:
        applies-to: version-updates
        patterns: ["*"]
      npm-security-updates:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-version-updates:
        applies-to: version-updates
        patterns: ["*"]
      actions-security-updates:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-version-updates:
        applies-to: version-updates
        patterns: ["*"]
      docker-security-updates:
        applies-to: security-updates
        patterns: ["*"]
